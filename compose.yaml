name: tpg-exam

services:
  php:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /var/www/html
    init: true
    volumes:
      - ./backend:/var/www/html:cached
      - /var/www/html/vendor
    environment:
      CI_ENVIRONMENT: development
      # Laravel DB config (Postgres)
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: app
      DB_USERNAME: app
      DB_PASSWORD: app
    depends_on:
      postgres:
        condition: service_healthy
    # Compose Watch: sync source; rebuild on dependency updates
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /var/www/html
        - action: rebuild
          path: ./backend/composer.json
        - action: rebuild
          path: ./backend/composer.lock

  nginx:
    image: nginx:alpine
    init: true
    ports:
      - "8090:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./backend/nginx.conf:/etc/nginx/conf.d:ro
    depends_on:
      php:
        condition: service_started
    # Compose Watch: sync site files and reload on config change
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /var/www/html
        - action: sync+restart
          path: ./backend/nginx.conf
          target: /etc/nginx/conf.d/default.conf

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h 127.0.0.1 -U app || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    profiles: [ "tools" ] # run only if you pass --profile tools
    ports:
      - "8091:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./pgadmin:/var/lib/pgadmin

  # Optional frontend for Svelte (run with `--profile frontend`)
  frontend:
    image: node:18-alpine
    profiles: [ "frontend" ]
    working_dir: /app
    volumes:
      - ./frontend:/app:cached
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      CHOKIDAR_USEPOLLING: "true"

volumes:
  postgres_data:
