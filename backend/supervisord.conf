[supervisord]
nodaemon=true

[program:php-fpm]
command=php-fpm
autostart=true
autorestart=true

[program:nginx]
command=/bin/sh -c "envsubst '\$PORT' < /etc/nginx/http.d/default.conf > /etc/nginx/http.d/default.conf.tmp && mv /etc/nginx/http.d/default.conf.tmp /etc/nginx/http.d/default.conf && nginx -g 'daemon off;'"
autostart=true
autorestart=true